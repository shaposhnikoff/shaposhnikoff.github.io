name: Generate CV PDF

on:
  push:
    branches: ["master"]
    paths:
      - "index.md"
      - "scripts/build_pdf.sh"
      - "scripts/cv-header.tex"
      - ".github/workflows/md_to_pdf.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "index.md"
      - "scripts/build_pdf.sh"
      - "scripts/cv-header.tex"
      - ".github/workflows/md_to_pdf.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cv-pdf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            poppler-utils \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-xetex \
            fonts-noto \
            fonts-noto-color-emoji

      - name: Set dated PDF filename
        id: pdf
        run: |
          pdf_date="$(date -u +%F)"
          pdf_name="shaposhnikov_devops_${pdf_date}.pdf"
          pdf_path="build/${pdf_name}"
          echo "name=${pdf_name}" >> "$GITHUB_OUTPUT"
          echo "path=${pdf_path}" >> "$GITHUB_OUTPUT"
          echo "PDF_PATH=${pdf_path}" >> "$GITHUB_ENV"

      - name: Generate and validate PDF
        run: ./scripts/build_pdf.sh index.md "$PDF_PATH"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pdf.outputs.name }}
          path: ${{ steps.pdf.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Send PDF to Telegram
        if: ${{ github.event_name != 'pull_request' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${PDF_PATH}" \
            -F "caption=CV PDF updated."
