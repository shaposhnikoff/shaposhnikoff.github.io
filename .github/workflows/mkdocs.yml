name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - "assets/**"
      - "_config.yml"
      - "index.md"
      - "mkdocs.yml"
      - "requirements.txt"
      - "scripts/build_pdf.sh"
      - ".github/workflows/mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            poppler-utils \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-xetex \
            fonts-noto \
            fonts-noto-color-emoji

      - name: Build site
        run: mkdocs build --clean --strict

      - name: Generate PDF for GitHub Pages
        run: ./scripts/build_pdf.sh index.md site/cv.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
